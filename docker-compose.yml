version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: feedpulse-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: feedpulse
    volumes:
      - mongo_data:/data/db
    networks:
      - feedpulse-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: feedpulse-backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/feedpulse
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      NODE_ENV: production
    depends_on:
      - mongodb
    networks:
      - feedpulse-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: feedpulse-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:5000
    depends_on:
      - backend
    networks:
      - feedpulse-network

volumes:
  mongo_data:

networks:
  feedpulse-network:
    driver: bridge
